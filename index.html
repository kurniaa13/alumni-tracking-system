<!DOCTYPE html>
<html>
<head>
    <title>Login Alumni</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg-shape"></div>
<div class="bg-shape2"></div>

<div class="login-container">
    <div class="login-card">

        <img src="images/toga.png" class="toga-img">

        <h2>Alumni Tracking System</h2>
        <p class="subtitle">Silakan login untuk melanjutkan</p>

        <form onsubmit="login(event)">
            
            <div class="input-group">
                <span>📧</span>
                <input type="email" id="email" placeholder="Email@gmail.com" required>
            </div>

            <div class="input-group">
                <span>🔒</span>
                <input type="password" id="password" placeholder="Password" required>
                <span class="eye" onclick="togglePassword()">👁️</span>
            </div>

            <div class="remember">
                <input type="checkbox"> Remember me
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <p class="register-text">
            Belum punya akun?
            <span id="registerBtn">Daftar sekarang</span>
        </p>

        <p id="error" class="error"></p>

    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
